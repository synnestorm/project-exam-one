    <link rel="manifest" href="../assets/favicon//site.webmanifest">
    <title>Eonline - Thank you!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">

        rel="stylesheet">

    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/pages/user.css">
</head>

<body>
    <header>
        <a href="../index.html"><img src="../assets/images/eonline-logo.png" class="logo-top"
                alt="Top logo for Eonline"></a>
        <nav class="navbar">
            <ul class="menu" id="myLinks">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../product/products.html">Shop</a></li>
                <li><a href="../product/products.html?category=electronics">Electronics</a></li>
                <li><a href="../product/products.html?category=fashion">Fashion</a></li>
                <li><a href="../product/products.html?category=beauty">Beauty</a></li>
                <li><a href="../account/login.html"><i class="fa-solid fa-user"></i></a></li>
                <li><a href="../cart/index.html"><i class="fa-solid fa-shopping-cart"></i></a></li>
            </ul>
        </nav>
        <div class="hamburger-div">
            <a href="#" class="hamburger"><i class="fa-solid fa-bars"></i></a>
        </div>
    </header>
    <main>
        <div class="container">
            <h1>Contact Us</h1>

            <form action="#" method="post" class="contact-form">

                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Ola Nordmann" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="olanordmann@mail.com" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number (Optional)</label>
                    <input type="tel" id="phone" name="phone" placeholder="0047 123 456 78">
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="i.e. feedback" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="What is on your mind.." required></textarea>
                </div>

                <button type="submit" class="btn-submit">Send Message</button>

            </form>

            <p class="footer-note">
                We typically respond within 1–2 business days.
            </p>
        </div>
    </main>

    <footer>
        <img src="../assets/images/evor-logo-bottom.png" class="logo-bottom">
        <ul>
            <li><a href="../pages/about.html">About us</a></li>
            <li><a href="../pages/info/terms.html">Terms & Conditions</a></li>
            <li><a href="../pages/info/privacy.html">Privacy & Policy</a></li>
            <li><a href="../pages/contact.html">Contact us</a></li>
        </ul>
    </footer>
<script src="../js/header.js"></script>
</body>

</html>
