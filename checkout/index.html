<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Eonline's checkout. Please fill your information down below for a smooth checkout process">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon//favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon//favicon-16x16.png">
    <link rel="manifest" href="../assets/favicon//site.webmanifest">
    <title>Eonline - Checkout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Text:ital@0;1&family=Figtree:ital,wght@0,300..900;1,300..900&family=Gravitas+One&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <script src="https://kit.fontawesome.com/3c3001c8de.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/pages/order-process.css">
</head>

<body>
    <header>
        <a href="../index.html"><img src="../assets/images/eonline-logo.png" class="logo-top"
                alt="Top logo for Eonline"></a>
        <nav class="navbar">
            <ul class="menu" id="myLinks">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../product/products.html">Shop</a></li>
                <li><a href="../product/products.html?category=electronics">Electronics</a></li>
                <li><a href="../product/products.html?category=fashion">Fashion</a></li>
                <li><a href="../product/products.html?category=beauty">Beauty</a></li>
                <li><a href="../account/login.html"><i class="fa-solid fa-user"></i></a></li>
                <li><a href="../cart/index.html"><i class="fa-solid fa-shopping-cart"></i></a></li>
            </ul>
        </nav>
        <div class="hamburger-div">
            <a href="#" class="hamburger"><i class="fa-solid fa-bars"></i></a>
        </div>

    </header>
    <main>
        <h1>Checkout</h1>
        <div class="checkout-container">
            <section class="cart">
            <h2 class="shopping">1. Shopping cart</h2>
            <div id="insideCart">
                <!-- This will show items in the cart -->
            </div>
        </section>
            <form id="checkout-form">
                <fieldset>
                <legend>2. Your information</legend>
                <div class="user-info">
                <label for="name">Full name:</label>
                <input id="name" type="text" name="name" required>
                <label for="address">Street name and number:</label>
                <input id="address" type="text" name="address" required>
                <div class="inputs-small">
                    <div class="input-group">
                <label for="zip">Zip Code:</label>
                <input id="zip" type="text" inputmode="numeric" name="zip" required></div>
                <div class="input-group">
                <label for="city">City:</label>
                <input id="city" type="text" name="city" required></div></div>
                <label for="country">Country:</label>
                <input id="country" type="text" name="country" required>
            </div>
                </fieldset>
                <fieldset>
                <legend>3. Payment methods</legend>
                <label class="choose"><input type="radio" name="payment" value="card" checked>Card</label>
                <div class="payment-card">
                <label for="card">Card number:</label>
                <input id="card" type="text" name="card" inputmode="numeric" placeholder="1234 5678 9101 1121" autocomplete="cc-number" minlength="16"
    maxlength="19" required>
                    <div class="inputs-small">
                        <div class="input-group">
                <label for="exp-date">Expiration:</label>
                <input id="exp-date" type="text" name="exp-date" autocomplete="cc-exp" required></div>
                <div class="input-group">
                <label for="cvc">CVC:</label>
                <input id="cvc" type="text" name="cvc" autocomplete="cc-csc" minlength="3" maxlength="4" required>
                </div>
            </div>
                <label for="cardname">Name on card:</label>
                <input id="cardname" type="text" name="cardname" autocomplete="cc-name" required>
            </div>
            <label class="choose"><input type="radio" name="payment" value="later">Buy now, pay later</label>
                <p>Get your items before you pay. Choose this option and enjoy up to 30 days to complete your
                    payment.</p>
            </fieldset>
                <button type="submit" class="complete-btn">Complete purchase</button>
            </form>
    </div>
    </main>

    <footer>
        <img src="../assets/images/evor-logo-bottom.png" class="logo-bottom" alt="bottom logo for Eonline, with a capital E">
        <ul>
            <li><a href="../pages/about.html">About us</a></li>
            <li><a href="../pages/info/terms.html">Terms & Conditions</a></li>
            <li><a href="../pages/info/privacy.html">Privacy & Policy</a></li>
            <li><a href="../pages/contact.html">Contact us</a></li>
        </ul>

    </footer>
    <script src="../js/header.js"></script>
<script src="../js/checkout.js"></script>
</body>

</html>
